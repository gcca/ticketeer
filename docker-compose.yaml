services:
  ticketeer:
    build:
      context: .
      dockerfile: Dockerfile
      target: execute
    image: ticketeer:latest
    environment:
      TZ: UTC
      DB_URL: /app/data/ticketeer.db
      UPLOAD_DIR: /app/data/upload
    ports:
      - "5521:5521"
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:
